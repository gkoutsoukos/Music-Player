<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Particle Egg Music Player</title>
  <link rel="stylesheet" href="css/player.css" />
</head>
<body>
  <main class="app-shell">
    <section class="visual-stage" aria-label="Music visualizer">
      <button id="orbToggle" class="orb-button" aria-label="Open playlist">
        <canvas id="visualizerCanvas"></canvas>
      </button>
    </section>

    <section id="nowPlaying" class="now-playing">
      <div id="trackTitle" class="track-title">Load music</div>
      <div id="trackMeta" class="track-meta">LOCAL FILES — PARTICLE PLAYER</div>
    </section>

    <section class="player-lower" aria-label="Playback controls">
      <div class="transport-main compact-transport">
        <button id="prevBtn" class="control-btn icon-btn prev-btn" aria-label="Previous track">
          <span class="sr-only">Previous track</span>
        </button>

        <button id="playBtn" class="control-btn icon-btn play-btn" aria-label="Play or pause">
          <span class="sr-only">Play or pause</span>
        </button>

        <button id="nextBtn" class="control-btn icon-btn next-btn" aria-label="Next track">
          <span class="sr-only">Next track</span>
        </button>
      </div>

      <div class="progress-wrap">
        <span id="currentTime" class="time-label">0:00</span>
        <input id="progress" class="progress" type="range" min="0" max="1000" value="0" aria-label="Track progress" />
        <span id="duration" class="time-label">0:00</span>
      </div>

      <label class="hidden-file-loader" aria-label="Load tracks">
        <input id="fileInput" type="file" accept="audio/*" multiple />
      </label>
    </section>

    <aside id="playlistPanel" class="playlist-panel" aria-hidden="true">
      <div class="playlist-header">
        <div>
          <div class="playlist-title">Loaded Tracks</div>
          <div id="playlistCount" class="playlist-count">0 tracks</div>
        </div>
        <button id="closePlaylist" class="close-btn" aria-label="Close playlist">×</button>
      </div>
      <div id="playlistList" class="playlist-list"></div>
    </aside>

    <audio id="audio"></audio>
  </main>

  <!-- Google Drive API configuration and helpers -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="js/config.js"></script>
  <script src="js/google-drive.js"></script>

  <!-- Main player logic -->
  <script src="js/player.js"></script>
</body>
</html>
